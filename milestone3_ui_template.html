<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund-Radar 基金筛选看板</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* 表格行悬停效果 */
        .fund-row { transition: all 0.2s ease; cursor: pointer; }
        .fund-row:hover { background-color: #eff6ff; transform: translateX(2px); }
        .fund-row.active { background-color: #dbeafe; border-left: 3px solid #3b82f6; }

        /* 图表容器动画 */
        .chart-panel { transition: all 0.3s ease; }
        .chart-panel:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

        /* 加载动画 */
        .loading-spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 渐入动画 */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4">

                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Fund-Radar</h1>
                        <p class="text-sm text-gray-500">动态基金筛选与重仓股可视化看板</p>
                    </div>
                </div>
                <div class="text-sm text-gray-500" id="updateTime">
                    数据更新时间：加载中...
                </div>
            </div>
        </div>
    </header>

    <!-- 参数控制面板 -->
    <section class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex flex-wrap items-end gap-4">
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-sm font-medium text-gray-700 mb-1">近1年收益率 ≥</label>
                    <div class="relative">
                        <input type="number" id="inputY1" value="100" min="0" max="500"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <span class="absolute right-3 top-2 text-gray-400">%</span>
                    </div>
                </div>
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-sm font-medium text-gray-700 mb-1">近6月收益率 ≥</label>
                    <div class="relative">
                        <input type="number" id="inputM6" value="60" min="0" max="300"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <span class="absolute right-3 top-2 text-gray-400">%</span>
                    </div>
                </div>
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-sm font-medium text-gray-700 mb-1">近3月收益率 ≥</label>
                    <div class="relative">
                        <input type="number" id="inputM3" value="40" min="0" max="200"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <span class="absolute right-3 top-2 text-gray-400">%</span>
                    </div>
                </div>
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-sm font-medium text-gray-700 mb-1">近1月收益率 ≥</label>
                    <div class="relative">
                        <input type="number" id="inputM1" value="25" min="0" max="100"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <span class="absolute right-3 top-2 text-gray-400">%</span>
                    </div>
                </div>
                <button id="btnSearch" onclick="handleSearch()"

                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <span>开始查询</span>

            </div>
        </div>
    </section>

    <!-- 主内容区：双栏布局 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 左侧：基金列表 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="px-4 py-3 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-gray-800">筛选结果</h2>

                </div>
                <div class="overflow-auto max-h-[600px]">
                    <table class="w-full">
                        <thead class="bg-gray-50 sticky top-0">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase cursor-pointer hover:text-gray-700" onclick="sortTable('code')">
                                    基金代码 <span class="sort-icon">↕</span>
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase cursor-pointer hover:text-gray-700" onclick="sortTable('name')">
                                    基金名称 <span class="sort-icon">↕</span>
                                </th>
                                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase cursor-pointer hover:text-gray-700" onclick="sortTable('y1')">
                                    近1年 <span class="sort-icon">↕</span>
                                </th>
                                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase cursor-pointer hover:text-gray-700" onclick="sortTable('m6')">
                                    近6月 <span class="sort-icon">↕</span>
                                </th>
                                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase cursor-pointer hover:text-gray-700" onclick="sortTable('m3')">
                                    近3月 <span class="sort-icon">↕</span>
                                </th>
                                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase cursor-pointer hover:text-gray-700" onclick="sortTable('m1')">
                                    近1月 <span class="sort-icon">↕</span>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="fundTableBody" class="divide-y divide-gray-100">
                            <!-- 动态填充 -->
                        </tbody>
                    </table>
                </div>
                <!-- 空状态 -->
                <div id="emptyState" class="hidden p-8 text-center">
                    <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-gray-500 text-lg">当前行情下暂无满足该硬性指标的基金</p>
                    <p class="text-gray-400 text-sm mt-2">请适当放宽标准后重试</p>
                </div>
            </div>

            <!-- 右侧：图表面板 -->
            <div class="space-y-6">
                <!-- 重仓股持仓权重饼图 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 chart-panel">
                    <div class="px-4 py-3 bg-gray-50 border-b border-gray-200">
                        <h2 class="text-lg font-semibold text-gray-800">前十大重仓股持仓权重</h2>
                        <p id="holdingsFundName" class="text-sm text-gray-500 mt-1">点击左侧基金查看</p>
                    </div>
                    <div id="holdingsChart" class="h-[300px]"></div>
                </div>

                <!-- 行业板块分布饼图 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 chart-panel">
                    <div class="px-4 py-3 bg-gray-50 border-b border-gray-200">
                        <h2 class="text-lg font-semibold text-gray-800">行业板块分布</h2>
                        <p id="industryFundName" class="text-sm text-gray-500 mt-1">点击左侧基金查看</p>
                    </div>
                    <div id="industryChart" class="h-[300px]"></div>
                </div>
            </div>
        </div>
    </main>

    let sortField = null;
    let sortAsc = true;

    // ECharts 实例
    let holdingsChart = null;
    let industryChart = null;

    // ============================================================
    // 初始化
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        // 初始化图表
        holdingsChart = echarts.init(document.getElementById('holdingsChart'));
        industryChart = echarts.init(document.getElementById('industryChart'));

        // 响应式调整
        window.addEventListener('resize', () => {
            holdingsChart?.resize();
            industryChart?.resize();
        });

        // 更新时间
        document.getElementById('updateTime').textContent =
            `数据更新时间：${new Date().toLocaleString('zh-CN')}`;

        // 加载Mock数据
        currentFunds = [...MOCK_FUNDS];
        renderFundTable(currentFunds);
    });

    // ============================================================
    // 查询处理（阶段四将接入真实URL参数）
    // ============================================================
    function handleSearch() {
        const y1 = document.getElementById('inputY1').value;
        const m6 = document.getElementById('inputM6').value;
        const m3 = document.getElementById('inputM3').value;
        const m1 = document.getElementById('inputM1').value;

        // 阶段三：使用Mock数据模拟筛选
        showLoading();
        setTimeout(() => {
            currentFunds = MOCK_FUNDS.filter(f =>
                f.y1 >= parseFloat(y1) &&
                f.m6 >= parseFloat(m6) &&
                f.m3 >= parseFloat(m3) &&
                f.m1 >= parseFloat(m1)
            );
            renderFundTable(currentFunds);
            hideLoading();
        }, 500);
    }

    // ============================================================
    // 表格渲染
    // ============================================================
    function renderFundTable(funds) {
        const tbody = document.getElementById('fundTableBody');
        const emptyState = document.getElementById('emptyState');
        const fundCount = document.getElementById('fundCount');

        fundCount.textContent = `${funds.length} 只`;

        if (funds.length === 0) {
            tbody.innerHTML = '';
            emptyState.classList.remove('hidden');
            return;
        }

        emptyState.classList.add('hidden');

        tbody.innerHTML = funds.map((fund, index) => `
            <tr class="fund-row fade-in ${selectedFund?.code === fund.code ? 'active' : ''}"
                style="animation-delay: ${index * 50}ms"
                onclick="selectFund('${fund.code}')">
                <td class="px-4 py-3 text-sm font-medium text-gray-900">${fund.code}</td>
                <td class="px-4 py-3 text-sm text-gray-700 max-w-[200px] truncate" title="${fund.name}">${fund.name}</td>
                <td class="px-4 py-3 text-sm text-right font-medium ${fund.y1 >= 100 ? 'text-green-600' : 'text-gray-900'}">${fund.y1.toFixed(2)}%</td>
                <td class="px-4 py-3 text-sm text-right font-medium ${fund.m6 >= 60 ? 'text-green-600' : 'text-gray-900'}">${fund.m6.toFixed(2)}%</td>
                <td class="px-4 py-3 text-sm text-right font-medium ${fund.m3 >= 40 ? 'text-green-600' : 'text-gray-900'}">${fund.m3.toFixed(2)}%</td>
                <td class="px-4 py-3 text-sm text-right font-medium ${fund.m1 >= 25 ? 'text-green-600' : 'text-gray-900'}">${fund.m1.toFixed(2)}%</td>
            </tr>
        `).join('');
    }

    // ============================================================
    // 基金选择与图表联动
    // ============================================================
    function selectFund(code) {
        selectedFund = currentFunds.find(f => f.code === code);
        if (!selectedFund) return;

        // 更新表格高亮
        document.querySelectorAll('.fund-row').forEach(row => row.classList.remove('active'));
        event.currentTarget.classList.add('active');

        // 渲染图表
        renderHoldingsChart(selectedFund);
        renderIndustryChart(selectedFund);
    }

    // ============================================================
    // 重仓股饼图
    // ============================================================
    function renderHoldingsChart(fund) {
        document.getElementById('holdingsFundName').textContent = `${fund.code} - ${fund.name}`;

        const data = fund.holdings.map(h => ({
            name: h.name,
            value: h.ratio
        }));

        // 计算"其他"比例
        const top10Total = data.reduce((sum, d) => sum + d.value, 0);
        if (top10Total < 100) {
            data.push({ name: '其他持仓', value: parseFloat((100 - top10Total).toFixed(2)) });
        }

        const option = {
            tooltip: {
                trigger: 'item',
                formatter: '{b}: {c}% ({d}%)'
            },
            legend: {
                orient: 'vertical',
                right: '5%',
                top: 'center',
                textStyle: { fontSize: 11 }
            },
            series: [{
                name: '持仓权重',
                type: 'pie',
                radius: ['40%', '70%'],
                center: ['40%', '50%'],
                avoidLabelOverlap: true,
                itemStyle: {
                    borderRadius: 6,
                    borderColor: '#fff',
                    borderWidth: 2
                },
                label: {
                    show: true,
                    formatter: '{b}\n{c}%',
                    fontSize: 11
                },
                emphasis: {
                    label: { show: true, fontSize: 14, fontWeight: 'bold' },
                    itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.2)' }
                },
                animationType: 'scale',
                animationEasing: 'elasticOut',
                animationDelay: (idx) => idx * 100,
                data: data
            }]
        };

        holdingsChart.setOption(option, true);
    }

    // ============================================================
    // 行业板块饼图
    // ============================================================
    function renderIndustryChart(fund) {
        document.getElementById('industryFundName').textContent = `${fund.code} - ${fund.name}`;

        // 过滤掉占比为0的行业
        const data = fund.industry
            .filter(i => i.ratio > 0)
            .map(i => ({
                name: i.name.length > 12 ? i.name.substring(0, 12) + '...' : i.name,
                fullName: i.name,
                value: i.ratio
            }));

        const option = {
            tooltip: {
                trigger: 'item',
                formatter: (params) => {
                    const item = data.find(d => d.name === params.name);
                    return `${item?.fullName || params.name}: ${params.value}% (${params.percent}%)`;
                }
            },
            legend: {
                orient: 'vertical',
                right: '5%',
                top: 'center',
                textStyle: { fontSize: 11 }
            },
            series: [{
                name: '行业分布',
                type: 'pie',
                radius: ['40%', '70%'],
                center: ['40%', '50%'],
                roseType: 'area',
                itemStyle: {
                    borderRadius: 6,
                    borderColor: '#fff',
                    borderWidth: 2
                },
                label: {
                    show: true,
                    formatter: '{b}\n{c}%',
                    fontSize: 11
                },
                emphasis: {
                    label: { show: true, fontSize: 14, fontWeight: 'bold' }
                },
                animationType: 'scale',
                animationEasing: 'elasticOut',
                animationDelay: (idx) => idx * 150,
                data: data
            }]
        };

        industryChart.setOption(option, true);
    }

    // ============================================================
    // 排序功能
    // ============================================================
    function sortTable(field) {
        if (sortField === field) {
            sortAsc = !sortAsc;
        } else {
            sortField = field;
            sortAsc = true;
        }

        currentFunds.sort((a, b) => {
            let valA, valB;
            switch (field) {
                case 'code': valA = a.code; valB = b.code; break;
                case 'name': valA = a.name; valB = b.name; break;
                case 'y1': valA = a.y1; valB = b.y1; break;
                case 'm6': valA = a.m6; valB = b.m6; break;
                case 'm3': valA = a.m3; valB = b.m3; break;
                case 'm1': valA = a.m1; valB = b.m1; break;
                default: return 0;
            }
            if (typeof valA === 'string') {
                return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            }
            return sortAsc ? valA - valB : valB - valA;
        });

        renderFundTable(currentFunds);
    }

    // ============================================================
    // 工具函数
    // ============================================================
    function showLoading() {
        document.getElementById('loadingOverlay').classList.remove('hidden');
    }

    function hideLoading() {
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
    </script>
